version: "3.8"
services:
  mssql:
    restart: always
    networks:
      - backplane
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${MSSQL_SA_PASSWORD}
      - MSSQL_PID=Developer
    volumes:
      - ../files/mssql-data:/var/opt/mssql
    ports:
      - "1433:1433"

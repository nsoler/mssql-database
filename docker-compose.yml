version: "3.9"
services:
  mssql:
    restart: always
    container_name: mssql
    networks:
      - backplane
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=Theron2026!!
      - MSSQL_PID=Developer
    volumes:
      - sqlserver_data:/var/opt/mssql
    ports:
      - "1433:1433"
  
  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    depends_on:
      - mssql
    # This command waits for SQL Server to start, then runs the create database command
    command: >
      bash -c '
      until /opt/mssql-tools/bin/sqlcmd -S db -U sa -P "Theron2026!!" -Q "CREATE DATABASE fcs_fostercare_db";
      do
        echo "Waiting for SQL Server to start..."
        sleep 2
      done
      '

  nats:
    image: nats:latest
    container_name: nats
    restart: always
    ports:
      - "4222:4222"
      - "8222:8222"
    command:
      - "--user"
      - "fcsnats"
      - "--pass"
      - "O-mjh74d+202"
      - "--cluster_name"
      - "FcsEventCluster"
      - "--cluster"
      - "nats://0.0.0.0:6222"
    networks:
      - backplane

volumes:
  sqlserver_data:
  
networks:
  backplane:
    name: backplane